<!DOCTYPE html>
<html>
<head>
  <title>Bus Booking System - μStack 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #f0f0f0;
      font-family: Arial;
      padding: 20px;
      margin: 0;
    }
    
    h1, p { text-align: center; color: #333; }
    
    /* Top Buttons Row */
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
    }
    
    .button-row button {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .button-row button:hover {
      background-color: #0056b3;
    }
    
    /* Table Style */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-top: 20px;
      overflow-x: auto;
    }
    
    th {
      background-color: #333;
      color: white;
      padding: 12px;
      text-align: center;
    }
    
    td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }
    
    tr:nth-child(even) { background-color: #f9f9f9; }
    
    .full { color: red; font-weight: bold; }
    .available { color: green; font-weight: bold; }
    
    td button {
      padding: 6px 12px;
      margin: 2px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .book-btn { background: green; color: white; }
    .spot-btn { background: orange; color: white; }
    .print-btn { background: #6c757d; color: white; }
    
    td button:disabled {
      background: gray !important;
      cursor: not-allowed;
    }
    
    .loading { text-align: center; padding: 50px; font-size: 18px; }
    
    @media (max-width: 768px) {
      table { font-size: 12px; }
      td, th { padding: 6px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>μStack Bus Booking System</h1>
    <p>Live from MongoDB - Devadath | μStack 2026</p>
  </header>

  <!-- Top Buttons - നീ ചോദിച്ചത് -->
  <div class="button-row">
    <button onclick="alert('Online Booking Panel Open ആവും')">Online Booking</button>
    <button onclick="alert('Spot Booking Panel Open ആവും')">Spot Booking</button>
    <button onclick="loadBuses()">Refresh Availability</button>
    <button onclick="alert('All Bus Timings കാണിക്കും')">Bus Timing</button>
    <button onclick="alert('Route Map കാണിക്കും')">Route</button>
    <button onclick="alert('Price List കാണിക്കും')">Ticket Price Type</button>
  </div>

  <main id="tableContainer">
    <p class="loading">Bus data load ആവുന്നു...</p>
  </main>

  <footer>
    <p style="text-align:center; margin-top:30px;">Created by Devadath | μStack 2026</p>
  </footer>

  <script>
    const API_URL = 'https://bus-backend-rtut.onrender.com/api/buses';
    
    // Horn sound
    function hornSound(msg) {
      alert('📢 ' + msg + ' Ready!');
    }

    // Spot/Online Booking function
    async function bookSeat(id, type) {
      try {
        const res = await fetch(`https://bus-backend-rtut.onrender.com/api/book/${id}`, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({type: type})
        });
        
        const data = await res.json();
        
        if (res.ok) {
          alert(`${type} Success ✅ Seats: ${data.available} remaining`);
          loadBuses();
        } else {
          alert('Error: ' + data.error);
        }
      } catch (err) {
        alert('Network error: ' + err.message);
      }
    }

    // Print Ticket function
    function printTicket(busNo, route, time, fare) {
      const printContent = `
        <h2>μStack Bus Ticket</h2>
        <hr>
        <p><b>Bus No:</b> ${busNo}</p>
        <p><b>Route:</b> ${route}</p>
        <p><b>Time:</b> ${time}</p>
        <p><b>Fare:</b> ₹${fare}</p>
        <p><b>Date:</b> ${new Date().toLocaleDateString()}</p>
        <hr>
        <p>Happy Journey! μStack 2026</p>
      `;
      const w = window.open('', '', 'height=600,width=400');
      w.document.write(printContent);
      w.document.close();
      w.print();
    }

    // Fetch and show table
    async function loadBuses() {
      const container = document.getElementById('tableContainer');
      try {
        const res = await fetch(API_URL);
        const buses = await res.json();

        if (buses.length === 0) {
          container.innerHTML = '<p class="loading">MongoDB-ൽ bus data ഇല്ല bro. Add ചെയ്യ്!</p>';
          return;
        }

        let table = `
          <table>
            <thead>
              <tr>
                <th>Bus No</th>
                <th>Route</th>
                <th>Bus Timing</th>
                <th>Available Seats Count</th>
                <th>Ticket Price Type</th>
                <th>Online Booking</th>
                <th>Spot Booking</th>
                <th>Print Out Ticket</th>
              </tr>
            </thead>
            <tbody>
        `;

        buses.forEach(bus => {
          const total = bus.totalSeats || 40;
          const booked = bus.bookedSeats || 0;
          const available = total - booked;
          const isFull = available <= 0;
          const route = `${bus.from || 'Kochi'} → ${bus.to || 'Trivandrum'}`;
          
          table += `
            <tr>
              <td>${bus.busNumber}</td>
              <td>${route}</td>
              <td>${bus.time}</td>
              <td class="${isFull ? 'full' : 'available'}">${available}/${total}</td>
              <td>Normal ₹${bus.fare || 0}</td>
              <td>
                <button class="book-btn" onclick="bookSeat('${bus._id}', 'Online')" ${isFull ? 'disabled' : ''}>
                  ${isFull ? 'Full' : 'Book Online'}
                </button>
              </td>
              <td>
                <button class="spot-btn" onclick="bookSeat('${bus._id}', 'Spot')" ${isFull ? 'disabled' : ''}>
                  ${isFull ? 'Full' : 'Spot Book'}
                </button>
              </td>
              <td>
                <button class="print-btn" onclick="printTicket('${bus.busNumber}', '${route}', '${bus.time}', ${bus.fare})">
                  Print Ticket
                </button>
              </td>
            </tr>
          `;
        });

        table += `</tbody></table>`;
        container.innerHTML = table;

      } catch (err) {
        container.innerHTML = `<p style="color:red; text-align:center">Error: ${err.message}. Backend check ചെയ്യ്!</p>`;
      }
    }

    loadBuses();
  </script>

</body>
</html>
