<!DOCTYPE html>
<html>
<head>
  <title>Bus Info Card - μStack 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #f0f0f0;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    
    h1 {
      color: #333;
    }
    
    /* Main container */
    main {
      margin-top: 20px;
    }
    
    /* Card styling */
    .card {
      background-color: white;
      width: 300px;
      margin: 15px auto;
      padding: 20px;
      border: 2px solid black;
      border-radius: 8px;
    }
    
    .bus-box {
      width: 100%;
      height: 140px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    
    button {
      background-color: green;
      color: white;
      padding: 12px 25px;
      margin-top: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      width: 100%;
    }
    
    button:hover {
      background-color: darkgreen;
    }
    
    /* Responsive for mobile */
    @media (max-width: 600px) {
      .card {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <!-- Semantic HTML: header -->
  <header>
    <h1>μStack Project 1</h1>
    <p>My Bus Card Project</p>
  </header>

  <!-- Semantic HTML: main -->
  <main>
    
    <!-- Semantic HTML: article -->
    <article class="card">
      <header>
        <h2>KSRTC Bus</h2>
      </header>
      
      <section class="bus-box" style="background-color: blue;">
        SUPER FAST
      </section>
      
      <section>
        <p><b>Name:</b> Super Fast</p>
        <p><b>Route:</b> Munnar to Ooty</p>
        <p><b>Type:</b> Government</p>
      </section>
      
      <footer>
        <button onclick="hornSound('KSRTC Bus Ready!')">Horn Adikku</button>
      </footer>
    </article>

    <!-- Semantic HTML: article -->
    <article class="card">
      <header>
        <h2>Private Bus</h2>
      </header>
      
      <section class="bus-box" style="background-color: red;">
        KALLADA G1
      </section>
      
      <section>
        <p><b>Name:</b> Kallada G1</p>
        <p><b>Route:</b> Kottayam to Bangalore</p>
        <p><b>Type:</b> Private</p>
      </section>
      
      <footer>
        <button onclick="hornSound('Private Bus Ready!')">Horn Adikku</button>
      </footer>
    </article>
    
  </main>

  <!-- Semantic HTML: footer -->
  <footer>
    <p>Created by Devadath | μStack 2026</p>
  </footer>

  <!-- Basic JS -->
  <script>
    function hornSound(msg) {
      alert(msg);
    }
  </script>

</body>
</html>
