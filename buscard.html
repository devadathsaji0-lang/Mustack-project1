<!DOCTYPE html>
<html>
<head>
  <title>Bus Booking System - μStack 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {background-color: #f0f0f0; font-family: Arial; padding: 20px; margin: 0;}
    h1, p { text-align: center; color: #333; }
    .back-btn {background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px;}
    table {width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px;}
    th {background-color: #333; color: white; padding: 12px; text-align: center;}
    td {padding: 10px; border: 1px solid #ddd; text-align: center; cursor: pointer;}
    tr:hover {background: #e8f4f8 !important; transform: scale(1.01);}
    tr:nth-child(even) { background-color: #f9f9f9; }
    .full { color: red; font-weight: bold; }
    .available { color: green; font-weight: bold; }
    .loading { text-align: center; padding: 50px; font-size: 18px; }
    button:hover:not(:disabled) {opacity: 0.9; transform: scale(1.02);}
    button:disabled {cursor: not-allowed;}
    
    /* Modal Popup CSS */
    .modal {display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);}
    .modal-content {background-color: white; margin: 8% auto; padding: 30px; border-radius: 10px; width: 85%; max-width: 500px; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
    .close {color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;}
    .close:hover {color: black;}
    .modal h2 {color: #333; margin-top: 0; text-align: center;}
    .modal p {font-size: 16px; margin: 12px 0;}
    @media (max-width: 768px) {
      table {font-size: 11px;}
      td, th {padding: 6px;}
    }
  </style>
</head>
<body>

  <header>
    <h1>μStack Bus Booking System</h1>
    <p>Click any row to view details - Devadath | μStack 2026</p>
  </header>

  <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back to Home</button>

  <main id="tableContainer">
    <p class="loading">Bus data load ആവുന്നു...</p>
  </main>

  <footer>
    <p style="text-align:center; margin-top:30px;">Created by Devadath | μStack 2026</p>
  </footer>

  <!-- Modal Popup -->
  <div id="detailsModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>🚌 Bus Full Details</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://bus-backend-rtut.onrender.com/api/buses';

    async function showDetails(busId) {
      try {
        const res = await fetch(`${API_URL}/${busId}`);
        const bus = await res.json();
        const total = bus.totalSeats || 40;
        const booked = bus.bookedSeats || 0;
        const available = total - booked;
        const route = `${bus.from || 'Kochi'} → ${bus.to || 'Trivandrum'}`;
        
        document.getElementById('modalBody').innerHTML = `
          <p><b>Bus No:</b> ${bus.busNumber}</p>
          <p><b>Route:</b> ${route}</p>
          <p><b>Bus Timing:</b> ${bus.time}</p>
          <p><b>Type:</b> ${bus.type || 'Normal Bus'}</p>
          <p><b>Online Price:</b> ₹${bus.fare}</p>
          <p><b>Spot Price:</b> ₹${bus.spotFare} <span style="color: orange;">+₹10 service charge</span></p>
          <p><b>Total Seats:</b> ${total}</p>
          <p><b>Booked Seats:</b> ${booked}</p>
          <p><b>Available Seats:</b> <span style="color: ${available > 0 ? 'green' : 'red'}; font-weight: bold; font-size: 18px;">${available}</span></p>
          <hr>
          <p><b>Amenities:</b> Fan, Pushback seats, Charging point, WiFi, Water bottle</p>
          
          ${available > 0 ? 
            `<button onclick="bookSeat('${bus._id}')" style="background:#28a745;color:white;padding:12px 25px;border:none;border-radius:5px;font-size:16px;cursor:pointer;width:100%;margin-top:15px;">
              🎫 Book Seat - Online ₹${bus.fare}
            </button>` 
            : 
            `<button disabled style="background:#dc3545;color:white;padding:12px 25px;border:none;border-radius:5px;font-size:16px;width:100%;margin-top:15px;">
              ❌ No Seats Available
            </button>`
          }
        `;
        
        document.getElementById('detailsModal').style.display = 'block';
      } catch (err) {
        alert('Error loading details: ' + err.message);
      }
    }

    function closeModal() {
      document.getElementById('detailsModal').style.display = 'none';
    }

    window.onclick = function(event) {
      const modal = document.getElementById('detailsModal');
      if (event.target == modal) {
        modal.style.display = 'none';
      }
    }

    async function loadBuses() {
      const container = document.getElementById('tableContainer');
      try {
        const res = await fetch(API_URL);
        const buses = await res.json();

        if (buses.length === 0) {
          container.innerHTML = '<p class="loading">MongoDB-ൽ bus data ഇല്ല bro. Add ചെയ്യ്!</p>';
          return;
        }

        let table = `
          <table>
            <thead>
              <tr>
                <th>Bus No</th>
                <th>Route</th>
                <th>Bus Timing</th>
                <th>Available Seats Count</th>
                <th>Ticket Price Type</th>
                <th>Total Seats</th>
                <th>Booked Seats</th>
                <th>Type</th>
              </tr>
            </thead>
            <tbody>
        `;

        buses.forEach(bus => {
          const total = bus.totalSeats || 40;
          const booked = bus.bookedSeats || 0;
          const available = total - booked;
          const isFull = available <= 0;
          const route = `${bus.from || 'Kochi'} → ${bus.to || 'Trivandrum'}`;
          
          table += `
            <tr onclick="showDetails('${bus._id}')">
              <td>${bus.busNumber}</td>
              <td>${route}</td>
              <td>${bus.time}</td>
              <td class="${isFull ? 'full' : 'available'}">${available}/${total}</td>
              <td>
                Online: ₹${bus.fare}<br>
                Spot: ₹${bus.spotFare}
              </td>
              <td>${total}</td>
              <td>${booked}</td>
              <td>${bus.type || 'Normal'}</td>
            </tr>
          `;
        });

        table += `</tbody></table>`;
        container.innerHTML = table;

      } catch (err) {
        container.innerHTML = `<p style="color:red; text-align:center">Error: ${err.message}. Backend check ചെയ്യ്!</p>`;
      }
    }

    loadBuses();

    async function bookSeat(busId) {
      if(!confirm('Online-ൽ book ചെയ്യണോ? ₹10 discount കിട്ടും ✅')) return;
      
      try {
        const res = await fetch(`https://bus-backend-rtut.onrender.com/api/book/${busId}`, {
          method: 'PUT'
        });
        const data = await res.json();
        
        if(res.ok) {
          alert('🎉 Seat booked successfully! \n' + data.msg);
          closeModal();
          loadBuses(); // Table refresh ചെയ്യും
        } else {
          alert('❌ ' + data.error);
        }
      } catch(err) {
        alert('Error: ' + err.message);
      }
    }
  </script>
</body>
</html>
