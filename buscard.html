<!DOCTYPE html>
<html>
<head>
  <title>Bus Booking System - μStack 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {background-color: #f0f0f0; font-family: Arial; padding: 20px; margin: 0;}
    h1, p { text-align: center; color: #333; }
    .back-btn {background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px;}
    table {width: 100%; border-collapse: collapse; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px;}
    th {background-color: #333; color: white; padding: 12px; text-align: center;}
    td {padding: 10px; border: 1px solid #ddd; text-align: center;}
    .busno-cell {color: blue; font-weight: bold; cursor: pointer; text-decoration: underline;}
    .busno-cell:hover {background: #e8f4f8;}
    .full { color: red; font-weight: bold; }
    .available { color: green; font-weight: bold; }
    .loading { text-align: center; padding: 50px; font-size: 18px; }
    button:hover:not(:disabled) {opacity: 0.9; transform: scale(1.02);}
    button:disabled {cursor: not-allowed;}
    
    .modal {display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5);}
    .modal-content {background-color: white; margin: 8% auto; padding: 30px; border-radius: 10px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
    .close {color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;}
    .close:hover {color: black;}
    .modal h2 {color: #333; margin-top: 0;}
    .modal p {font-size: 18px; margin: 15px 0;}
    .btn-group {display: flex; gap: 12px; margin-top: 25px;}
    @media (max-width: 768px) {
      table {font-size: 11px;}
      td, th {padding: 6px;}
    }
  </style>
</head>
<body>

  <header>
    <h1>μStack Bus Booking System</h1>
    <p>Click Bus No for details - Devadath | μStack 2026</p>
  </header>

  <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back to Home</button>

  <main id="tableContainer">
    <p class="loading">Bus data load ആവുന്നു...</p>
  </main>

  <footer>
    <p style="text-align:center; margin-top:30px;">Created by Devadath | μStack 2026</p>
  </footer>

  <div id="detailsModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2>🚌 Bus Details</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://bus-backend-rtut.onrender.com/api/buses';

    async function showDetails(busId) {
      try {
        const res = await fetch(`${API_URL}/${busId}`);
        const bus = await res.json();
        const total = bus.totalSeats || 40;
        const booked = bus.bookedSeats || 0;
        const available = total - booked;
        
        // Safe check - type ഇല്ലെങ്കിൽ Private ആക്കും
        let busTypeLower = bus.type ? bus.type.toLowerCase() : '';
        let busCategory = busTypeLower.includes('ksrtc') || busTypeLower.includes('government') ? 'Government' : 'Private';
        let busName = bus.type || 'Normal Bus';
        
        document.getElementById('modalBody').innerHTML = `
          <p style="font-size:22px;"><b>Bus No:</b> ${bus.busNumber}</p>
          <p style="font-size:18px;"><b>Name:</b> ${busName}</p>
          <p style="font-size:18px;"><b>Type:</b> ${busCategory}</p>
          
          <hr style="margin:25px 0;">
          
          ${available > 0 ? 
            `<div class="btn-group">
              <button onclick="bookSeat('${bus._id}', '${bus.busNumber}', ${bus.fare}, 'online', '${busName}')" 
                style="background:#28a745;color:white;padding:16px;border:none;border-radius:8px;font-size:15px;cursor:pointer;flex:1;">
                🎫 Online<br><b>₹${bus.fare}</b>
              </button>
              
              <button onclick="bookSeat('${bus._id}', '${bus.busNumber}', ${bus.spotFare}, 'offline', '${busName}')" 
                style="background:#ff9800;color:white;padding:16px;border:none;border-radius:8px;font-size:15px;cursor:pointer;flex:1;">
                🚌 Offline<br><b>₹${bus.spotFare}</b>
              </button>
            </div>` 
            : 
            `<button disabled style="background:#dc3545;color:white;padding:16px;border:none;border-radius:8px;font-size:16px;width:100%;">
              ❌ No Seats Available
            </button>`
          }
        `;
        
        document.getElementById('detailsModal').style.display = 'block';
      } catch (err) {
        alert('Error loading details: ' + err.message);
      }
    }

    function closeModal() {
      document.getElementById('detailsModal').style.display = 'none';
    }

    window.onclick = function(event) {
      const modal = document.getElementById('detailsModal');
      if (event.target == modal) {
        modal.style.display = 'none';
      }
    }

    async function loadBuses() {
      const container = document.getElementById('tableContainer');
      try {
        const res = await fetch(API_URL);
        const buses = await res.json();

        if (buses.length === 0) {
          container.innerHTML = '<p class="loading">MongoDB-ൽ bus data ഇല്ല bro. Add ചെയ്യ്!</p>';
          return;
        }

        let table = `
          <table>
            <thead>
              <tr>
                <th>Bus No</th>
                <th>Route</th>
                <th>Bus Timing</th>
                <th>Available Seats</th>
                <th>Ticket Price Type</th>
                <th>Total Seats</th>
                <th>Booked Seats</th>
                <th>Type</th>
              </tr>
            </thead>
            <tbody>
        `;

        buses.forEach(bus => {
          const total = bus.totalSeats || 40;
          const booked = bus.bookedSeats || 0;
          const available = total - booked;
          const isFull = available <= 0;
          const route = `${bus.from || 'Munnar'} to ${bus.to || 'Ooty'}`;
          
          table += `
            <tr>
              <td class="busno-cell" onclick="showDetails('${bus._id}')">${bus.busNumber}</td>
              <td>${route}</td>
              <td>${bus.time}</td>
              <td class="${isFull ? 'full' : 'available'}">${available}/${total}</td>
              <td>
                Online: ₹${bus.fare}<br>
                Spot: ₹${bus.spotFare}
              </td>
              <td>${total}</td>
              <td>${booked}</td>
              <td>${bus.type || 'Normal'}</td>
            </tr>
          `;
        });

        table += `</tbody></table>`;
        container.innerHTML = table;

      } catch (err) {
        container.innerHTML = `<p style="color:red; text-align:center">Error: ${err.message}. Backend check ചെയ്യ്!</p>`;
      }
    }

    loadBuses();

    async function bookSeat(busId, busNo, fare, type, busType) {
      if(!confirm(`${type.toUpperCase()} Booking?\nBus: ${busNo}\nPrice: ₹${fare}`)) return;
      
      try {
        const res = await fetch(`https://bus-backend-rtut.onrender.com/api/book/${busId}?type=${type}`, {
          method: 'PUT'
        });
        const data = await res.json();
        
        if(res.ok) {
          alert(`✅ ${type.toUpperCase()} Ticket Booked!\nBus: ${busNo}\nFare: ₹${fare}`);
          printTicket(busNo, fare, 'A1', type, busType);
          closeModal();
          loadBuses();
        } else {
          alert('❌ ' + data.error);
        }
      } catch(err) {
        alert('Error: ' + err.message);
      }
    }

    function printTicket(busNo, fare, seatNo, type, busType) {
      let today = new Date().toLocaleDateString();
      let time = new Date().toLocaleTimeString();
      
      let ticketHTML = `
        <html>
          <head>
            <title>μStack Bus Ticket</title>
            <style>
              body { font-family: Arial; padding: 20px; background: #f4f4f4; }
              .ticket { border: 3px dashed #007bff; padding: 25px; max-width: 320px; margin: auto; background: white; border-radius: 10px; }
              h2 { text-align: center; color: #007bff; margin: 0 0 15px 0; }
              .row { margin: 12px 0; font-size: 16px; }
              .label { font-weight: bold; color: #333; }
              hr { border: 1px dashed #ccc; }
            </style>
          </head>
          <body>
            <div class="ticket">
              <h2>🚌 μSTACK BUS TICKET</h2>
              <hr>
              <div class="row"><span class="label">Bus No:</span> ${busNo}</div>
              <div class="row"><span class="label">Name:</span> ${busType}</div>
              <div class="row"><span class="label">Seat No:</span> ${seatNo}</div>
              <div class="row"><span class="label">Booking:</span> ${type.toUpperCase()}</div>
              <div class="row"><span class="label">Fare:</span> ₹${fare}</div>
              <div class="row"><span class="label">Date:</span> ${today}</div>
              <div class="row"><span class="label">Time:</span> ${time}</div>
              <hr>
              <p style="text-align:center; font-size:12px; color: gray;">Created by Devadath | μStack 2026</p>
            </div>
            <script>window.onload = function(){ window.print(); }<\/script>
          </body>
        </html>
      `;
      
      let printWindow = window.open('', '_blank');
      printWindow.document.write(ticketHTML);
      printWindow.document.close();
    }
  </script>
</body>
</html>
