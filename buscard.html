<!DOCTYPE html>
<html>
<head>
  <title>Bus Info Card - μStack 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #f0f0f0;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    
    h1 {
      color: #333;
    }
    
    main {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .card {
      background-color: white;
      width: 300px;
      margin: 15px;
      padding: 20px;
      border: 2px solid black;
      border-radius: 8px;
    }
    
    .bus-box {
      width: 100%;
      height: 140px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    
    button {
      background-color: green;
      color: white;
      padding: 12px 25px;
      margin-top: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      width: 100%;
    }
    
    button:hover {
      background-color: darkgreen;
    }
    
    .loading {
      font-size: 18px;
      color: gray;
      margin-top: 50px;
    }
    
    @media (max-width: 600px) {
      .card {
        width: 90%;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>μStack Project 1</h1>
    <p>Bus Card Project - Live from MongoDB</p>
  </header>

  <main id="busContainer">
    <p class="loading">Bus data load ആവുന്നു...</p>
  </main>

  <footer>
    <p>Created by Devadath | μStack 2026</p>
  </footer>

  <script>
    const API_URL = 'https://bus-backend-rtut.onrender.com/api/bus';
    const container = document.getElementById('busContainer');

    function hornSound(msg) {
      alert(msg);
    }

    // Random color generator for bus box
    function getRandomColor() {
      const colors = ['blue', 'red', 'green', 'purple', 'orange', 'teal'];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    // Fetch buses from backend
    async function loadBuses() {
      try {
        const res = await fetch(API_URL);
        const buses = await res.json();

        if (buses.length === 0) {
          container.innerHTML = '<p class="loading">ഇപ്പൊ bus ഒന്നുമില്ല bro. MongoDB-ൽ add ചെയ്യ്!</p>';
          return;
        }

        container.innerHTML = ''; // loading text clear ചെയ്യ്

        buses.forEach(bus => {
          const color = getRandomColor();
          const card = `
            <article class="card">
              <header>
                <h2>${bus.busNumber || 'Bus'}</h2>
              </header>
              
              <section class="bus-box" style="background-color: ${color};">
                ${bus.route || 'No Route'}
              </section>
              
              <section>
                <p><b>Bus No:</b> ${bus.busNumber}</p>
                <p><b>Route:</b> ${bus.route}</p>
                <p><b>Time:</b> ${bus.time}</p>
              </section>
              
              <footer>
                <button onclick="hornSound('${bus.busNumber} Ready!')">Horn Adikku</button>
              </footer>
            </article>
          `;
          container.innerHTML += card;
        });

      } catch (err) {
        container.innerHTML = `<p style="color:red">Error: ${err.message}. Backend online ആണോന്ന് check ചെയ്യ്!</p>`;
        console.error(err);
      }
    }

    // Page load ആകുമ്പോൾ bus data എടുക്കും
    loadBuses();
  </script>

</body>
</html>
